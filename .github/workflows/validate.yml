name: Plugin Validation

on:
  push:
    branches: [main, master]
    paths:
      - '.claude-plugin/**'
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/**'
      - 'rules/**'
      - '*.mcp.json'
      - '.lsp.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Run CPV validation (--strict via remote launcher)
        # NOTE: do NOT add `CLAUDE_PRIVATE_USERNAMES: ${{ github.repository_owner }}`
        # here. That canon recommendation (CPV pipeline-rules.md) is buggy — it makes
        # the leak scanner flag the PUBLIC owner name (present in every github.com/<owner>
        # URL) as 12 false `CRITICAL: private path leaked`, turning CI red. See
        # claude-plugins-validation#141. CI has no local machine username to protect.
        run: |
          echo "=== CPV Plugin Validation (--strict) ==="
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation@v2.136.1 \
              --with pyyaml \
              cpv-remote-validate plugin . --strict --verbose --report validation-report.md
          EXIT_CODE=$?
          set -e

          # Exit codes: 0=PASS, 1=CRITICAL, 2=MAJOR, 3=MINOR, 4=NIT (strict)
          # Quality gate: ONLY exit 0 passes. All issues block.
          if [ $EXIT_CODE -eq 0 ]; then
            echo "=== Validation PASSED (--strict) ==="
          else
            echo "=== BLOCKED: Validation issues found (exit $EXIT_CODE) ==="
            cat validation-report.md 2>/dev/null || true
            exit $EXIT_CODE
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.md
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Plugin Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f validation-report.md ]; then
            cat validation-report.md >> $GITHUB_STEP_SUMMARY
          fi
